<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Progressive Pie Chart (New Grammar)</title>
  <script src="https://cdn.jsdelivr.net/npm/vega@5"></script>
  <script src="https://cdn.jsdelivr.net/npm/vega-lite@5"></script>
  <script src="../build/vega-embed.min.js"></script>
  <link rel="stylesheet" href="progress.css">
</head>

<body>
  <div id="vis"></div>
  <script>
    (async function () {
      const spec = {
        $schema: 'https://vega.github.io/schema/vega-lite/v5.json',
        width: 400,
        height: 400,

        // -- input data --
        data: {
          values: [
            { category: 'Arizona', count: 5.10 },
            { category: 'Florida', count: 8.19 },
            { category: 'Georgia', count: 4.80 },
            { category: 'Illinois', count: 5.93 },
            { category: 'Michigan', count: 5.08 },
            { category: 'New York', count: 4.80 },
            { category: 'Ohio', count: 4.52 },
            { category: 'Tennessee', count: 4.80 },
            { category: 'Texas', count: 12.43 },
            { category: 'Other', count: 44.35 }
          ]
        },

        // -- progressive control section (new) --
        provega: {
          progression: {
            // -- data chunking --
            chunking: {
              type: 'data',
              reading: {
                method: 'sequential',
                ascending: true,
                chunk_size: 1,
                frequency: 800,
                seed: 0
              }
            },

            // ── parametri di controllo dell'esecuzione ──
            control: {
              mode: 'exploration',
              pause: true,
              stop: true,
              backward: true,
              min_frequency: 800,
              min_rendering_frequency: null
            },

            // ── parametri di monitoring ──
            monitoring: {
              aliveness: true,
              etc: 'eta_ms',
              progressbar: true,
              change: {
                area: false,
                mark: false,
                noise_reduction: true
              },
              quality: {
                absolute_progress: {
                  on_data_input: true,
                  on_result_output: true,
                  on_visual_output: true
                },
                relative_progress: {
                  on_data_input: true,
                  on_result_output: true,
                  on_visual_output: true
                },
                relative_stability: {
                  on_data_input: false,
                  on_result_output: false,
                  on_visual_output: false
                },
                absolute_certainty: {
                  on_result_output: false
                }
              }
            }
          },

          // -- visualization configuration --
          visualization: {
            visual_stability: false,
            similarity_anchors: false
          }
        },

        // ── trasformazioni intermedie ──
        transform: [
          { window: [{ op: 'sum', field: 'count', as: 'total' }] },
          { calculate: 'datum.count / datum.total', as: 'percent' },
          {
            calculate: "format(datum.percent * 100, '.2f') + ' %'",
            as: 'percentLabel'
          }
        ],

        // ── layers grafici ──
        layer: [
          {
            mark: { type: 'arc', outerRadius: 120 },
            encoding: {
              theta: { field: 'count', type: 'quantitative', stack: true },
              color: {
                field: 'category', type: 'nominal',
                scale: {
                  domain: ['Arizona', 'Florida', 'Georgia', 'Illinois', 'Michigan', 'New York', 'Ohio', 'Tennessee', 'Texas', 'Other'],
                  range: ['#2A77E1', '#FCC062', '#E46034', '#3E5B81', '#BEBFC2', '#1A3B65', '#FDE383', '#1E98D1', '#CC6C4B', '#005CDB']
                }
              },
              opacity: { value: 1 }
            }
          },
          {
            mark: {
              type: 'text',
              radiusOffset: 10,
              fontSize: 12,
              fill: '#1f1f1f',
              stroke: '#ffffff',
              strokeWidth: 2,
              align: 'center',
              baseline: 'middle'
            },
            encoding: {
              theta: { field: 'count', type: 'quantitative', stack: true },
              radius: { value: 150 },
              text: { field: 'percentLabel', type: 'nominal' },
              color: { field: 'category', type: 'nominal' }
            }
          }
        ],

        // ── tooltip ──
        encoding: {
          tooltip: [
            { field: 'category', type: 'nominal', title: 'State' },
            { field: 'percent', type: 'quantitative', title: 'Percentage', format: '.1%' }
          ]
        },

        // ── configurazioni grafiche aggiuntive ──
        config: {
          background: '#ffffff'
        }
      };

      await vegaEmbed('#vis', spec, {
        tooltip: true,
        actions: false
      });
    })();
  </script>
</body>

</html>
