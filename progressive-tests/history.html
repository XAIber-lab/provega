<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Live Timeline - Stacked Confidence Bars (New Grammar)</title>
  <script src="https://cdn.jsdelivr.net/npm/vega@5"></script>
  <script src="https://cdn.jsdelivr.net/npm/vega-lite@5"></script>
  <script src="../build/vega-embed.min.js"></script>
  <link rel="stylesheet" href="progress.css">
</head>

<body>
  <div id="vis"></div>
  <script>
    function generateSyntheticData(startTime, endTime, intervalMinutes = 2) {
      const data = [];
      const confidences = [1, 2, 3, 4, 5, 6, 7, 8, 9];
      const start = new Date(startTime);
      const end = new Date(endTime);

      for (let time = new Date(start); time <= end; time.setMinutes(time.getMinutes() + intervalMinutes)) {
        const isoTime = new Date(time).toISOString();

        // Generiamo un count totale variabile
        const totalCount = Math.floor(Math.random() * 10) + 5;

        // 1) few occurrences of conf=1 (red)
        const capCount = Math.floor(Math.random() * 1.5) + 1; // 1–2 elementi
        for (let i = 0; i < capCount; i++) {
          data.push({ time: isoTime, confidence: 1 });
        }

        // 2) more occurrences of conf=3 (light yellow)
        const boostCount = Math.floor(Math.random() * 3) + 4; // 3–5 elementi
        for (let i = 0; i < boostCount; i++) {
          data.push({ time: isoTime, confidence: 3 });
        }

        // 3) BOOST VERDI (confidence 5–9)
        const greenConfs = [5, 6, 7, 8, 9];
        const greenBoostCount = Math.floor(Math.random() * 4) + 3; // 3–6 elementi
        for (let i = 0; i < greenBoostCount; i++) {
          const conf = greenConfs[Math.floor(Math.random() * greenConfs.length)];
          data.push({ time: isoTime, confidence: conf });
        }

        // 4) il resto distribuito tra le altre confidence (escludiamo 1 e 3)
        const remaining = totalCount - capCount - boostCount - greenBoostCount;
        for (let i = 0; i < remaining; i++) {
          let conf;
          do {
            conf = confidences[Math.floor(Math.random() * confidences.length)];
          } while (conf === 1 || conf === 3);
          data.push({ time: isoTime, confidence: conf });
        }
      }
      return data;
    }

    async function run() {
      const spec = {
        $schema: 'https://vega.github.io/schema/vega-lite/v5.json',
        description: 'Live timeline with stacked bar segments representing classifier confidence',
        width: 650,
        height: 300,
        padding: { bottom: 60, left: 20 },

        provega: {
          progression: {
            chunking: { type: 'data', reading: { method: 'sequential', ascending: true, chunk_size: 2, frequency: 500 } },
            control: {
              mode: 'exploration', pause: true, stop: true, backward: true,
              min_frequency: 500, min_rendering_frequency: null
            },
            monitoring: {
              aliveness: true,
              etc: 'eta_ms',
              progressbar: true,
              change: { mark: { active: true, blink:true } },
              quality: {
                absolute_progress: { on_data_input: true, on_result_output: true, on_visual_output: true },
                relative_progress: { on_data_input: true, on_result_output: true, on_visual_output: true },
                relative_stability: { on_data_input: false, on_result_output: false, on_visual_output: false },
                absolute_certainty: { on_result_output: false }
              }
            }
          },
          visualization: { visual_stability: false, similarity_anchors: false }
        },

        data: {
          values: generateSyntheticData('2025-04-29T06:00:00Z', '2025-04-29T08:20:00Z'),
          format: { type: 'json' }
        },

        transform: [
          { calculate: "datum.confidence === 1 ? 0.1 : 1", as: "wt" }
        ],

        mark: { type: 'bar', tooltip: true, width: 15 },
        encoding: {
          x: {
            field: 'time', type: 'temporal', title: 'Time',
            axis: { format: '%H:%M', labelAngle: -45, grid: false }
          },
          y: {
            aggregate: 'sum', field: 'wt', type: 'quantitative',
            title: 'counts', stack: 'zero'
          },
          color: {
            field: 'confidence', type: 'ordinal',
            scale: {
              domain: [1, 2, 3, 4, 5, 6, 7, 8, 9],
              range: ['#8B0000', '#FDB061', '#FEE18C', '#FFFFC0', '#DAF08D', '#A8DA6A', '#66BE63', '#12994F', '#006834']
            },
            sort: 'descending',
            legend: { title: 'Confidence', orient: 'top' }
          }
        },

        config: {
          background: '#f7f7f7',
          view: { stroke: null },
          axis: {
            labelFont: 'Arial', labelFontSize: 12, titleFontSize: 14, gridColor: '#dddddd'
          }
        }
      };


      await vegaEmbed('#vis', spec, {
        config: spec.config,
        tooltip: { theme: 'dark' }
      });
    }

    run();
  </script>
</body>

</html>
